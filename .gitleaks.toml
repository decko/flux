title = "Flux gitleaks config"

[allowlist]
  description = "Global Allowlist"

  # Ignore based on file path
  paths = [
    '''\.env\.example''',
    '''\.env$''',
    '''soda\.yaml\.example''',
    '''flux\.yaml\.example''',
    '''_test\.go$''',
    '''web/src/api/.*test\.ts''',
    '''web/src/.*\.test\.tsx''',
  ]

  # Ignore lines matching known test fixtures
  regexes = [
    '''ghs_test_token''',
    '''ghs_fresh_token''',
    '''ghs_expired''',
    '''ghs_cached_valid''',
    '''ghs_install_''',
  ]
